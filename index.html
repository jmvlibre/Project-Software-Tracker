<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://project-software-tracker.vercel.app/">
    <title>Opening Project Software Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 26px;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 6px;
        color: #ffffff;
        background: #0f766e;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Project Software Tracker</h1>
      <p>This project runs on Vercel because it uses serverless API routes for Supabase sync.</p>
      <a href="https://project-software-tracker.vercel.app/">Open the app</a>
    </main>
  </body>
</html>
